<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PHDDEC</title>
  <script>
    // SPA redirect trick for GitHub Pages
    // Redirect /foo/bar to /?p=foo/bar so index.html can handle it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
      l.pathname.slice(1).split('/').join('~') +
      (l.search ? '&q=' + l.search.slice(1).split('&').join('~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
